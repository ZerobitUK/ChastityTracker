<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock Assistant</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-container">
        <!-- Section: Initial Setup -->
        <section id="setup-screen" class="screen">
            <h2>Initialise Lock</h2>
            <div class="input-group">
                <label>Set 4-Digit PIN</label>
                <input type="password" id="pin-input" maxlength="4" placeholder="0000">
            </div>
            <div class="input-group">
                <label>Maximum Random Duration (Hours)</label>
                <input type="number" id="max-time-input" value="48">
            </div>
            <button id="start-lock-btn" class="primary-btn">Start Lock</button>
        </section>

        <!-- Section: Active Lock Screen -->
        <section id="lock-screen" class="screen hidden">
            <h2>Lock Active</h2>
            <div class="timer-display">
                <p>Initial Lock Remaining:</p>
                <span id="main-countdown">--:--:--</span>
            </div>
            <div id="penalty-container" class="penalty-box">
                <p>Current Penalty:</p>
                <span id="penalty-timer">+00:00:00</span>
            </div>
            <button id="request-unlock-btn" class="primary-btn hidden">Request Unlock</button>
        </section>

        <!-- Section: Game Area -->
        <section id="game-screen" class="screen hidden">
            <h2 id="game-title">Challenge</h2>
            <div id="game-container">
                <!-- Game content will be injected here via JS -->
            </div>
            <p id="game-feedback"></p>
        </section>

        <!-- Section: Unlock/Recovery -->
        <section id="unlock-screen" class="screen hidden">
            <h2>Lock Opened</h2>
            <div class="pin-reveal">
                <p>Your PIN is:</p>
                <h1 id="revealed-pin">----</h1>
            </div>
            <p class="note">The lock has been reset.</p>
        </section>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/time.js"></script>
    <script src="js/games.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
