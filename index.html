<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timed Lock Assistant</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-container">
        <!-- Section: Initial Setup -->
        <section id="setup-screen" class="screen">
            <h2>Initialise Lock</h2>
            <div class="input-group">
                <label>Set 4-Digit PIN</label>
                <input type="password" id="pin-input" maxlength="4" placeholder="0000">
            </div>
            <div class="input-group">
                <label>Maximum Random Duration (Hours)</label>
                <input type="number" id="max-time-input" value="48">
            </div>
            <button id="start-lock-btn" class="primary-btn">Start Lock</button>
        </section>

        <!-- Section: Active Lock Screen -->
        <section id="lock-screen" class="screen hidden">
            <h2>Lock Active</h2>
            <div class="timer-display" id="main-countdown">--:--:--</div>
            <div class="penalty-box">
                <p>Current Penalty Time</p>
                <span id="penalty-timer">+00:00:00</span>
            </div>
            <button id="request-unlock-btn" class="primary-btn hidden">Request Unlock</button>
            
            <div class="recovery-info">
                <p>Master Recovery Key</p>
                <input type="text" id="recovery-input" placeholder="RECOVER-XXXX-XXXX">
                <button id="recovery-btn">Apply Key</button>
            </div>
        </section>

        <!-- Section: Game Area -->
        <section id="game-screen" class="screen hidden">
            <h2 id="game-title">Challenge</h2>
            <div id="game-container"></div>
            <p id="game-feedback"></p>
        </section>

        <!-- Section: Unlock Screen -->
        <section id="unlock-screen" class="screen hidden">
            <h2>Lock Opened</h2>
            <div class="pin-reveal">
                <p>Your PIN is:</p>
                <h1 id="revealed-pin">----</h1>
            </div>
            <button id="reset-app-btn" class="secondary-btn">New Session</button>
        </section>
    </div>

    <!-- Logic Modules -->
    <script src="js/storage.js"></script>
    <script src="js/time.js"></script>
    <script src="js/games.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
